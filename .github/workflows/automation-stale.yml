name: Automation - Stale

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale issues and pull requests
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 30
          days-before-close: 7
          stale-issue-message: |
            This issue has had no activity for 30 days and is marked as stale.
            It will be closed in 7 days unless updated.
          stale-pr-message: |
            This PR has had no activity for 30 days and is marked as stale.
            It will be closed in 7 days unless updated.
          close-issue-message: |
            Closing due to inactivity. Reopen if this is still relevant.
          close-pr-message: |
            Closing due to inactivity. Reopen if this is still relevant.
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,priority:high
          exempt-pr-labels: pinned,security,priority:high
