name: Deploy Railway

on:
  workflow_run:
    workflows:
      - Continuous Integration
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
    steps:
      - name: Trigger Railway deploy hook (optional)
        env:
          RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RAILWAY_DEPLOY_HOOK_URL" ]; then
            echo "RAILWAY_DEPLOY_HOOK_URL not set."
            echo "Railway GitHub auto-deploy mode will handle deployment after CI passes."
            exit 0
          fi

          curl --fail --show-error --silent -X POST "$RAILWAY_DEPLOY_HOOK_URL"

      - name: Post-deploy healthcheck (optional)
        env:
          APP_HEALTHCHECK_URL: ${{ secrets.APP_HEALTHCHECK_URL }}
        run: |
          if [ -n "$APP_HEALTHCHECK_URL" ]; then
            curl --fail --show-error --silent "$APP_HEALTHCHECK_URL"
          else
            echo "APP_HEALTHCHECK_URL not set. Skipping healthcheck."
          fi
