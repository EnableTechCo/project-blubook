name: Automation - Issue Summary

on:
  issues:
    types:
      - opened
      - edited

permissions:
  issues: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update issue summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;
            const marker = '<!-- issue-summary-bot -->';

            const bodyRaw = (issue.body || '').trim();
            const bodyCompact = bodyRaw.replace(/\s+/g, ' ');
            const preview = bodyCompact.length > 600 ? `${bodyCompact.slice(0, 600)}...` : bodyCompact;
            const labels = (issue.labels || []).map((l) => l.name).join(', ') || 'none';

            const summary = `${marker}
            ### Issue Summary
            - Title: ${issue.title}
            - Labels: ${labels}
            - Reporter: @${issue.user.login}
            - Short Description: ${preview || 'No description provided.'}

            ### Triage Checklist
            - [ ] Reproducible
            - [ ] Correct priority assigned
            - [ ] Assigned to owner
            - [ ] Linked to milestone/project
            `;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((c) => typeof c.body === 'string' && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: summary,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: summary,
              });
            }
