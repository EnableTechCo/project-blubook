<!doctype html>
<html lang="und" dir="auto" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Purchase Order Received</title>
    <style type="text/css">
        body { margin: 0; padding: 0; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        @media only screen and (max-width: 640px) {
            .container { width: 100% !important; }
            .pad { padding-left: 18px !important; padding-right: 18px !important; }
        }
    </style>
</head>
<body style="background:#050c16;word-spacing:normal;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#050c16;">
        <tr>
            <td align="center" style="padding:24px 10px;">
                <table role="presentation" width="640" class="container" cellspacing="0" cellpadding="0"
                    style="width:640px;max-width:640px;border:1px solid #224972;border-radius:18px;overflow:hidden;background:#081426;">
                    <tr>
                        <td class="pad"
                            style="padding:34px 40px;background:linear-gradient(125deg,#071225 0%,#0d2d4e 55%,#081426 100%);border-bottom:1px solid #264f78;">
                            <p style="font-family:Verdana,Arial,sans-serif;font-size:12px;line-height:1.2;letter-spacing:2px;text-transform:uppercase;color:#79ecff;">
                                BluBook Order Updates</p>
                            <p style="margin-top:14px;font-family:Verdana,Arial,sans-serif;font-size:34px;line-height:1.1;font-weight:700;color:#ffffff;">
                                PO Received</p>
                            <p style="margin-top:12px;font-family:Verdana,Arial,sans-serif;font-size:15px;line-height:1.7;color:#c1d1e8;">
                                Hello {{customer_name}}, our Sales team has successfully received your Purchase Order ({{po_number}}).</p>
                        </td>
                    </tr>
                    <tr>
                        <td class="pad" style="padding:24px 40px 34px;">
                            <table role="presentation" width="100%" cellspacing="0" cellpadding="0"
                                style="border:1px solid #234b74;border-radius:14px;background:#0a2138;">
                                <tr>
                                    <td style="padding:16px 16px 12px;font-family:Verdana,Arial,sans-serif;font-size:13px;line-height:1.7;color:#c2d3e8;">
                                        Your order is now being processed. You can track its status directly through your dashboard.
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
