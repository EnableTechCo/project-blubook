<!doctype html>
<html lang="und" dir="auto" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Order Delivered</title>
    <style type="text/css">
        body { margin: 0; padding: 0; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        @media only screen and (max-width: 640px) {
            .container { width: 100% !important; }
            .pad { padding-left: 18px !important; padding-right: 18px !important; }
        }
    </style>
</head>
<body style="background:#091506;word-spacing:normal;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#091506;">
        <tr>
            <td align="center" style="padding:24px 10px;">
                <table role="presentation" width="640" class="container" cellspacing="0" cellpadding="0"
                    style="width:640px;max-width:640px;border:1px solid #227236;border-radius:18px;overflow:hidden;background:#08260d;">
                    <tr>
                        <td class="pad"
                            style="padding:34px 40px;background:linear-gradient(125deg,#07250a 0%,#0d4e1f 55%,#08260d 100%);border-bottom:1px solid #26783d;">
                            <p style="font-family:Verdana,Arial,sans-serif;font-size:12px;line-height:1.2;letter-spacing:2px;text-transform:uppercase;color:#79ff9c;">
                                BluBook Logistics</p>
                            <p style="margin-top:14px;font-family:Verdana,Arial,sans-serif;font-size:34px;line-height:1.1;font-weight:700;color:#ffffff;">
                                Order Delivered</p>
                            <p style="margin-top:12px;font-family:Verdana,Arial,sans-serif;font-size:15px;line-height:1.7;color:#c1e8c7;">
                                Hello {{customer_name}}, your order ({{order_id}}) has been successfully delivered and the workflow is now complete.</p>
                        </td>
                    </tr>
                    <tr>
                        <td class="pad" style="padding:24px 40px 34px;">
                            <table role="presentation" width="100%" cellspacing="0" cellpadding="0"
                                style="border:1px solid #237435;border-radius:14px;background:#0a3814;">
                                <tr>
                                    <td style="padding:16px 16px 12px;font-family:Verdana,Arial,sans-serif;font-size:13px;line-height:1.7;color:#c2e8c9;">
                                        Thank you for your business. All documentation related to this delivery is now available in your workspace.
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
